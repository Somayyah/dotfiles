# Font
font_family      Fira Code
font_size        12.0

# Cursor
cursor_shape     block
cursor_blink_interval 0

# Window
background_opacity 0.85
hide_window_decorations no

# Colors (simple readable theme)
foreground #dddddd
background #000000

# Spacing
window_padding_width 10

# Bell off (no jumpscares)
enable_audio_bell no
